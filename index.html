<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>座・高円寺 精算チェッカー Ver.1</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🎭 座・高円寺 精算チェッカー</h1>

    <p class="version">
        Version 1.0
    </p>

    <div class="card">

        <h2>① 券種別売上明細</h2>

        <input type="file" id="salesDetail" accept=".xlsx,.xls">

    </div>

    <div class="card">

        <h2>② 売上サマリ</h2>

        <input type="file" id="summary" accept=".xlsx,.xls">

    </div>

    <div class="card">

        <h2>③ 販売済み席番</h2>

        <input type="file" id="seatList" accept=".xlsx,.xls">

    </div>

    <div class="card">

        <h2>④ 返券明細</h2>

        <input type="file" id="returnList" accept=".xlsx,.xls">

    </div>

    <div class="card">

        <h2>⑤ 車いす・介助者リスト（PDF）</h2>

        <input type="file" id="wheelchair" accept=".pdf">

    </div>

    <button id="checkButton">
        チェック開始
    </button>

    <div id="result">

        <h2>チェック結果</h2>

        <p>まだチェックを実行していません。</p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
